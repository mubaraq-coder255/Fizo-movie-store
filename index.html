<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="max-age=31536000, public">
    <title>Fizo Movies Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="logo-container">
            <img src="logo.jpg" class="fizo-logo">
            <span>FIZO MOVIES STORE</span>
        </a>
    </header>
    <div class="movie-grid" id="movieGrid"></div>
    <div id="cookie-banner" class="cookie-box">
        <p>Tovuti hii inatumia cookies.</p>
        <button onclick="acceptCookies()">ACCEPT ALL</button>
    </div>
    <script defer>
        fetch('movies.json').then(res => res.json()).then(data => {
            const grid = document.getElementById('movieGrid');
            data.forEach(m => {
                grid.innerHTML += `<a href="${m.link}" class="movie-card"><img src="${m.image}" loading="lazy"><p>${m.title}</p></a>`;
            });
        });
        window.onload = () => { if (!localStorage.getItem("fizoCookies")) document.getElementById('cookie-banner').classList.add('show'); }
        function acceptCookies() { localStorage.setItem("fizoCookies", "true"); document.getElementById('cookie-banner').classList.remove('show'); }
    </script>
</body>
</html>
