<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizo Movies Store</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Fizo Movies Store - Jipatie muvi mpya zilizotafsiriwa na series kali kwa bei nafuu.">
<meta name="keywords" content="Muvi, Tanzania, Sisu 2, Action Movies, Fizo Store, Tafsiri">
<meta name="author" content="Fizo">  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
   <h1>FIZO MOVIES STORE</h1>
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="searchMovie()" placeholder="Tafuta muvi...">
        </div>
        <nav class="categories">
            <button onclick="filterMovies('all')">ZOTE</button>
            <button onclick="filterMovies('action')">ACTION</button>
            <button onclick="filterMovies('comedy')">COMEDY</button>
            <button onclick="filterMovies('crime')">CRIME</button>
            <button onclick="filterMovies('mpya')">MPYA</button>
        </nav>
    </header>
    <div class="slider">
        <div class="slides">
            <img src="wakubwa.jpg" alt="Muvi 1">
            <img src="series.jpg" alt="Muvi 2">
            <img src="mpya.jpg" alt="Muvi 3">
        </div>
    </div>
    
    <main>
        <div class="view-all-container">
    <a href="all-movies.html" class="view-all-btn">ANGALIA ZOTE <i class="fas fa-chevron-right"></i></a>
        </div>
        <div class="movie-grid" id="movieGrid"></div>
<script defer>
    // Kodi yako ya fetch hapa...
</script>
    </main>

    <script>
        function filterMovies(cat) {
            document.querySelectorAll('.movie-card').forEach(card => {
                card.style.display = (cat === 'all' || card.getAttribute('data-category') === cat) ? "block" : "none";
            });
        }
        function searchMovie() {
            let val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.movie-card').forEach(card => {
                card.style.display = card.getAttribute('data-title').includes(val) ? "block" : "none";
            });
        }
    </script>
    <script>
    // Ionyeshe banner baada ya sekunde 2
    window.onload = function() {
        if (!localStorage.getItem("cookiesAccepted")) {
            setTimeout(() => {
                document.getElementById('cookie-banner').classList.add('show');
            }, 2000);
        }
    }

    // Function ya kukubali
    function acceptCookies() {
        localStorage.setItem("cookiesAccepted", "true");
        document.getElementById('cookie-banner').classList.remove('show');
    }
    </script>
    
</body>
</html>

</button>

</div>
