<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizo Movies Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>FIZO MOVIES STORE</h1>
        <nav class="categories">
            <button onclick="filterMovies('all')">ZOTE</button>
            <button onclick="filterMovies('action')">ACTION</button>
            <button onclick="filterMovies('comedy')">COMEDY</button>
            <button onclick="filterMovies('crime')">CRIME</button>
        </nav>
    </header>

    <main>
        <div class="movie-grid">
            <a href="player.html" class="movie-card" data-category="action">
                <img src="wakubwa.jpg" alt="Action Muvi">
            </a>
            <a href="player.html" class="movie-card" data-category="comedy">
                <img src="series.jpg" alt="Comedy Muvi">
            </a>
            <a href="player.html" class="movie-card" data-category="crime">
                <img src="mpya.jpg" alt="Crime Muvi">
            </a>
        </div>
    </main>

    <script>
        function filterMovies(category) {
            let cards = document.querySelectorAll('.movie-card');
            cards.forEach(card => {
                if (category === 'all' || card.getAttribute('data-category') === category) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
