<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizo Movies Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-area">
            <img src="logo.jpg" class="fizo-logo" alt="Logo">
            <h1>FIZO MOVIES STORE</h1>
        </div>
        <input type="text" id="searchInput" onkeyup="searchMovie()" placeholder="Tafuta muvi...">
        <nav class="categories">
            <button onclick="filterMovies('all')">ZOTE</button>
            <button onclick="filterMovies('action')">ACTION</button>
            <button onclick="filterMovies('comedy')">COMEDY</button>
        </nav>
    </header>

    <main>
        <div class="movie-grid" id="movieGrid"></div>
    </main>

    <div id="cookie-banner" class="cookie-box"><p>Tovuti hii inatumia cookies.</p><button onclick="acceptCookies()">ACCEPT ALL</button></div>

    <script defer>
        fetch('movies.json').then(res => res.json()).then(data => {
            const grid = document.getElementById('movieGrid');
            data.forEach(m => {
                grid.innerHTML += `<a href="${m.link}" class="movie-card" data-cat="${m.category}" data-title="${m.title.toLowerCase()}">
                    <img src="${m.image}" loading="lazy"><p>${m.title}</p></a>`;
            });
        });
        function filterMovies(cat) {
            document.querySelectorAll('.movie-card').forEach(c => c.style.display = (cat === 'all' || c.dataset.cat === cat) ? "block" : "none");
        }
        function searchMovie() {
            let val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.movie-card').forEach(c => c.style.display = c.dataset.title.includes(val) ? "block" : "none");
        }
    </script>
</body>
</html>
