<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizo Movies Store - Karibu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">FIZO MOVIES</div>
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="searchMovie()" placeholder="Tafuta muvi...">
        </div>
    </header>

    <main>
        <h2 class="section-title">Action Movies</h2>
        <div class="movie-grid" id="movieGrid">
            <a href="player.html" class="movie-card">
                <img src="wakubwa.jpg" alt="Sisu 2">
                <div class="movie-title">Sisu 2</div>
                <div class="movie-meta">Action | Imetafsiriwa</div>
            </a>
            
            <a href="player.html" class="movie-card">
                <img src="series.jpg" alt="Outside the Wire">
                <div class="movie-title">Outside the Wire</div>
                <div class="movie-meta">Action | Netflix</div>
            </a>
        </div>
    </main>

    <script>
        function searchMovie() {
            let val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.movie-card').forEach(card => {
                let title = card.querySelector('.movie-title').innerText.toLowerCase();
                card.style.display = title.includes(val) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
