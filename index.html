<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizo Movies Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <h1>FIZO MOVIES STORE</h1>
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="searchMovie()" placeholder="Tafuta muvi...">
        </div>
        <nav class="categories">
            <button onclick="filterMovies('all')">ZOTE</button>
            <button onclick="filterMovies('action')">ACTION</button>
            <button onclick="filterMovies('comedy')">COMEDY</button>
            <button onclick="filterMovies('crime')">CRIME</button>
        </nav>
    </header>

    <div class="slider">
        <div class="slides">
            <img src="wakubwa.jpg" alt="Muvi 1">
            <img src="series.jpg" alt="Muvi 2">
            <img src="mpya.jpg" alt="Muvi 3">
        </div>
    </div>

    <main>
        <div class="categories">
    <button onclick="filterMovies('Zote')">Zote</button>
    <button onclick="filterMovies('Action')">Action</button>
    <button onclick="filterMovies('Comedy')">Comedy</button>
        </div>
        <div id="movieGrid" class="movie-grid">
    </div>

<script>
fetch('movie.json')
  .then(response => response.json())
  .then(movies => {
    const grid = document.getElementById('movieGrid');
    
    movies.forEach(movie => {
        // Tunatengeneza kadi kwa kila muvi kwenye JSON
        grid.innerHTML += `
            <a href="player.html?id=${movie.id}" class="movie-card">
                <img src="${movie.image}" alt="${movie.title}">
                <p>${movie.title}</p>
            </a>
        `;
    });
  });
</script>
    </main>

    <script>
        function filterMovies(cat) {
            document.querySelectorAll('.movie-card').forEach(card => {
                card.style.display = (cat === 'all' || card.getAttribute('data-category') === cat) ? "block" : "none";
            });
        }
        function searchMovie() {
            let val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.movie-card').forEach(card => {
                const title = card.getAttribute('data-title') || "";
                card.style.display = title.includes(val) ? "block" : "none";
            });
        }
    </script>
    
    <footer class="site-footer">
        <div class="footer-links">
            <a href="#">About</a> | <a href="#">Contact</a>
        </div>
        <p>Connect with us:</p>
        <div class="social-icons">
            <a href="https://www.facebook.com/share/1JBskKRo2A/" class="social-btn"><i class="fab fa-facebook-f"></i></a>
            <a href="https://wa.me/255749705400?text=Habari+Fizo+Movies+Online" class="social-btn"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.instagram.com/fizomoviesonline" class="social-btn"><i class="fab fa-instagram"></i></a>
        </div>
        <p>Copyright © 2026 Fizo Movies Store.</p>
    </footer>

    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="top-btn">
        <i class="fas fa-chevron-up"></i>
    </button>
</body>
</html>
