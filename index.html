<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Fizo Movies Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>FIZO MOVIES STORE</h1>
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="searchMovie()" placeholder="Tafuta muvi...">
        </div>
        <nav class="categories">
            <button onclick="filterMovies('all')">ZOTE</button>
            <button onclick="filterMovies('action')">ACTION</button>
            <button onclick="filterMovies('comedy')">COMEDY</button>
        </nav>
    </header>

    <div class="slider"><div class="slides"><img src="wakubwa.jpg"><img src="series.jpg"><img src="mpya.jpg"></div></div>

    <main id="movieGrid">
        <a href="player.html" class="movie-card" data-category="action" data-title="untamed rider">
            <img src="wakubwa.jpg"><p>UNTAMED RIDER</p><small>👁 1.2K Views | 👍 450 Likes</small>
        </a>
    </main>

    <script>
        function filterMovies(cat) {
            document.querySelectorAll('.movie-card').forEach(c => c.style.display = (cat==='all' || c.getAttribute('data-category')===cat) ? "block" : "none");
        }
        function searchMovie() {
            let val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.movie-card').forEach(c => c.style.display = c.getAttribute('data-title').includes(val) ? "block" : "none");
        }
    </script>
</body>
</html>
