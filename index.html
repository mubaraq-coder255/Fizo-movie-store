<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizo Movies Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <header>
        <h1>FIZO MOVIES STORE</h1>
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="searchMovie()" placeholder="Tafuta muvi hapa...">
        </div>
        <nav class="categories">
            <button onclick="filterMovies('all')">ZOTE</button>
            <button onclick="filterMovies('action')">ACTION</button>
            <button onclick="filterMovies('comedy')">COMEDY</button>
            <button onclick="filterMovies('crime')">CRIME</button>
        </nav>
    </header>

    <main>
        <div class="movie-grid" id="movieGrid">
            <a href="player.html" class="movie-card" data-category="action" data-title="untamed rider">
                <img src="wakubwa.jpg" alt="Muvi">
                <p>UNTAMED RIDER</p>
            </a>
            <a href="player.html" class="movie-card" data-category="comedy" data-title="series bomba">
                <img src="series.jpg" alt="Muvi">
                <p>SERIES BOMBA</p>
            </a>
        </div>
    </main>

    <script>
        function filterMovies(cat) {
            document.querySelectorAll('.movie-card').forEach(card => {
                card.style.display = (cat === 'all' || card.getAttribute('data-category') === cat) ? "block" : "none";
            });
        }
        function searchMovie() {
            let val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.movie-card').forEach(card => {
                card.style.display = card.getAttribute('data-title').includes(val) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
