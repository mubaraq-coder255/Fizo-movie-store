<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Fizo Movies Store</title>
</head>
<body>
    <header>
        <h1>FIZO MOVIES STORE</h1>
        <input type="text" id="searchInput" onkeyup="searchMovie()" placeholder="Tafuta muvi...">
    </header>
    <div class="movie-grid" id="movieGrid">
        <a href="player.html" class="movie-card"><img src="wakubwa.jpg"><p>UNTAMED RIDER</p></a>
        <a href="player.html" class="movie-card"><img src="series.jpg"><p>SERIES BOMBA</p></a>
    </div>
    <footer class="site-footer"><p>Copyright © 2026 Fizo Movies Store.</p></footer>
    <script>
        function searchMovie() {
            let val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.movie-card').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
