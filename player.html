<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Player - Fizo Movies</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header"><a href="index.html" class="logo-container">← RUDI NYUMBANI</a></header>
    <video controls autoplay muted playsinline class="main-video" style="width:100%">
        <source src="link_ya_muvi.mp4" type="video/mp4">
    </video>
    <a href="https://wa.me/255749705400" class="buy-btn">BUY FULL MOVIE</a>
    <div class="related-section">
        <h3>Muvi Nyingine:</h3>
        <div class="movie-grid" id="relatedGrid"></div>
    </div>
    <script defer>
        fetch('movies.json').then(res => res.json()).then(data => {
            const grid = document.getElementById('relatedGrid');
            data.slice(0, 3).forEach(m => {
                grid.innerHTML += `<a href="${m.link}" class="movie-card"><img src="${m.image}" loading="lazy"><p>${m.title}</p></a>`;
            });
        });
    </script>
</body>
</html>
