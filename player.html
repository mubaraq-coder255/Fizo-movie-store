<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Fizo Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player-container">
        <a href="index.html" class="back-btn">← Rudi Nyuma kwenye Home</a>
        
        <video width="100%" controls poster="wakubwa.jpg">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            Kivinjari chako hakiauni video hii.
        </video>
        
        <h2>Jina la Muvi Inayocheza</h2>

        <section class="comments-section">
            <h3>Maoni (Comments)</h3>
            <div class="comment-box">
                <textarea id="comment-input" placeholder="Andika maoni yako hapa..."></textarea>
                <button onclick="addComment()">Tuma Maoni</button>
            </div>
            <div id="comment-list" class="comment-list">
                <p><strong>Juma:</strong> Muvi hii ni nzuri sana!</p>
            </div>
        </section>
    </div>

    <script>
        function addComment() {
            let input = document.getElementById('comment-input');
            let commentText = input.value;
            if (commentText !== "") {
                let list = document.getElementById('comment-list');
                let newComment = document.createElement('p');
                newComment.innerHTML = "<strong>Mtumiaji:</strong> " + commentText;
                list.appendChild(newComment);
                input.value = ""; 
            }
        }
    </script>
</body>
</html>
