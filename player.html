<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizo Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player-container">
        <a href="index.html" class="back-btn">← Rudi Nyuma</a>
        
        <video controls poster="wakubwa.jpg">
            <https://www.w3schools.com/html/mov_bbb.mp4>
        </video>
        
        <h2>Jina la Muvi</h2>
        
        <section class="comments-section">
            <h3>Maoni</h3>
            <textarea id="comm" placeholder="Andika maoni..."></textarea>
            <button onclick="addComm()">Tuma</button>
            <div id="list"></div>
        </section>
    </div>
    <script>
        function addComm() {
            let txt = document.getElementById('comm').value;
            if(txt) {
                document.getElementById('list').innerHTML += "<p><strong>Mtumiaji:</strong> " + txt + "</p>";
                document.getElementById('comm').value = "";
            }
        }
    </script>
</body>
</html>
