    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player-container">
        <video controls poster="wakubwa.jpg" class="main-video">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>

        <div class="movie-info">
            <h1>Sisu 2</h1>
            <div class="stats-line">👁 330 Views | Action | Imetafsiriwa</div>
            
            <a href="https://wa.me/255749705400?text=Habari, Nahitaji kuDownload muvi: Sisu 2" class="buy-btn">

            <div class="action-buttons">

                <button class="share-btn" onclick="shareMovie()">Share</button>
            </div>

    <script>
        function addToWatchlist() {
            alert("Muvi imeongezwa kwenye Watchlist!");

        function shareMovie() {
            if (navigator.share) {
                navigator.share({ title: document.title, url: window.location.href });
            } else {
                alert("Link imenakiliwa!");
            }
        }
    </script>
</body>
</html>
